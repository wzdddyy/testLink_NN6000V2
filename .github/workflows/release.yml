name: Go_Release

on:
  workflow_dispatch:
  schedule:
    # 每 3 天编译一次（UTC 时间，北京时间 = UTC+8）
    # UTC 20:00 = 北京时间 04:00
    - cron: '0 20 */3 * *'

env:
  DEVICE_MODEL: link_nn6000v2_immwrt
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
  REPO_BRANCH: main
  BUILD_DIR: imm-nss
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    permissions:
      actions: write
      contents: write
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      
      - name: Build System Setup
        run: |
          # 步骤 1: 清理预装软件
          echo "=== Disk Space Before Cleanup ==="
          df -h
          
          # 卸载大型不需要的软件包
          sudo apt-get purge -y \
            dotnet* \
            ghc* \
            libboost* \
            android* \
            swift* \
            chromium* \
            chrome* \
            firefox* \
            ffmpeg* \
            powershell* \
            codeql* \
            microsoft* \
            || true
          
          sudo apt-get autoremove -y --purge
          sudo docker system prune -a -f 2>/dev/null || true
          sudo rm -rf /var/lib/apt/lists/*
          
          echo "=== Disk Space After Cleanup ==="
          df -h
          
          # 步骤 2: 初始化构建环境
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          
          # 步骤 3: 安装额外依赖
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          
          # 步骤 4: 清理安装产生的缓存
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo rm -rf /var/lib/apt/lists/*
          
          sudo -E systemctl daemon-reload
          
          echo "=== Final Disk Space ==="
          df -h

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "BUILD_SRC=${{ env.REPO_URL }}" >> $GITHUB_ENV

      - name: Clone Source Code
        run: |
          chmod +x ./nn6000v2/scripts/update.sh
          chmod +x ./nn6000v2/scripts/build.sh
          
          # 克隆仓库
          echo "克隆仓库: ${{ env.REPO_URL }} 分支: ${{ env.REPO_BRANCH }}"
          git clone --depth 1 -b ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} ./action_build
          echo "${{ env.REPO_URL }}/${{ env.REPO_BRANCH }}" > ./repo_flag
          
          # 移除国内下载源
          PROJECT_MIRRORS_FILE="./action_build/scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Cache Build Dependencies
        uses: actions/cache@v5.0.4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            # 更新所有 stamp 文件的时间戳
            find "./action_build/staging_dir" -type d -name "stamp" -exec touch {} +
            # 更新 staging_dir 下所有文件的时间戳
            find "./action_build/staging_dir" -type f -exec touch {} +
            # 创建构建完成标记
            mkdir -p ./action_build/tmp && echo "1" > ./action_build/tmp/.build
          fi

      - name: Build Firmware
        run: |
          ./nn6000v2/scripts/build.sh ${{ env.DEVICE_MODEL }}
          
          # 获取内核版本
          FIRST_MANIFEST=$(ls ./firmware/*.manifest | head -1)
          if [ -n "$FIRST_MANIFEST" ]; then
            echo "Manifest 文件：$FIRST_MANIFEST"
            echo "查找内核版本..."
            KVER=$(grep "^kernel " "$FIRST_MANIFEST" | grep -oE "[4-6]\.[0-9]+\.[0-9]+" | head -1 || echo "")
            if [ -n "$KVER" ]; then
              echo "KVER=$KVER" >> $GITHUB_ENV
              echo "内核版本：$KVER"
            else
              echo "KVER=unknown" >> $GITHUB_ENV
              echo "未找到内核版本"
              echo "Manifest 文件内容预览:"
              head -20 "$FIRST_MANIFEST"
            fi
          else
            echo "KVER=unknown" >> $GITHUB_ENV
            echo "manifest 文件不存在"
          fi

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          CURRENT_KEY="${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}"
          echo "当前缓存 key: $CURRENT_KEY"
          
          gh cache list --json key --jq '.[] | .key' 2>/dev/null | while read -r key; do
            if [ -n "$key" ] && [ "$key" != "$CURRENT_KEY" ]; then
              echo "删除旧缓存：$key"
              gh cache delete "$key" 2>/dev/null || true
            fi
          done
          
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache 2>/dev/null | cut -f 1 || echo 'N/A')"
          echo "staging: $(du -sh ./action_build/staging_dir 2>/dev/null | cut -f 1 || echo 'N/A')"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="


      - name: Prepare Release Body
        run: |
          {
            echo "## 版本信息"
            echo "- 源码：${{ env.BUILD_SRC }}"
            echo "- Kernel: ${{ env.KVER }}"
            echo "- WIFI 密码：147258369"
            echo "- LAN 地址：10.0.0.1"
            echo "- 账户：root"
            echo "- 密码：无"
            echo "- no_wifi 后缀的版本未包含 WIFI 驱动程序"
          } > release_body.txt

      - name: Clean Old Releases, Tags and Workflow Runs
        continue-on-error: true
        run: |
          # 获取当前发布的 tag
          CURRENT_TAG="${{ env.BUILD_DATE }}_${{ env.DEVICE_MODEL }}"
          echo "当前编译版本：$CURRENT_TAG"
          
          # ========== 清理 Releases 和 Tags ==========
          echo "开始清理旧的 releases..."
          
          # 获取所有 releases 并排序（按创建时间倒序）
          ALL_TAGS=$(gh release list --limit 1000 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName' 2>/dev/null || echo "")
          
          # 保留最近 2 个版本，删除其他所有
          if [ -n "$ALL_TAGS" ]; then
            echo "$ALL_TAGS" | tail -n +3 | while read -r old_tag; do
              if [ -n "$old_tag" ]; then
                echo "删除旧版本：$old_tag"
                gh release delete "$old_tag" --cleanup-tag --yes 2>/dev/null || echo "删除失败：$old_tag"
              fi
            done
          fi
          
          echo "清理孤立的 tags..."
          git fetch --tags 2>/dev/null || true
          git fetch --tags --prune 2>/dev/null || true
          # 获取远程所有 tags 并排序
          ALL_REMOTE_TAGS=$(git tag -l | sort -V | tac)
          echo "$ALL_REMOTE_TAGS" | tail -n +3 | while read -r tag; do
            if [ -n "$tag" ]; then
              echo "删除孤立 tag: $tag"
              git tag -d "$tag" 2>/dev/null || true
            fi
          done
          git push origin --tags --force 2>/dev/null || true
          
          echo "Releases 和 Tags 清理完成！"
          
          # ========== 清理 Workflow 运行记录 ==========
          echo "开始清理旧的 workflow 运行记录..."
          
          # 使用当前 workflow 的 ID
          CURRENT_RUN_ID=${{ github.run_id }}
          WORKFLOW_ID=${{ github.workflow }}
          echo "Workflow: $WORKFLOW_ID, Run ID: $CURRENT_RUN_ID"
          
          # 删除旧的运行记录（保留最近 2 次）
          if [ -n "$WORKFLOW_ID" ]; then
            gh api /repos/${{ github.repository }}/actions/workflows/$WORKFLOW_ID/runs \
              --paginate --jq '.workflow_runs[] | select(.id != '"$CURRENT_RUN_ID"') | .id' 2>/dev/null | \
              tail -n +2 | while read -r run_id; do
                if [ -n "$run_id" ]; then
                  echo "删除 workflow 运行记录：$run_id"
                  gh api -X DELETE /repos/${{ github.repository }}/actions/runs/$run_id 2>/dev/null || true
                fi
              done
          fi
          
          echo "所有清理工作完成！"

      - name: Release Firmware
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ env.DEVICE_MODEL }}
          files: |
            ./firmware/*.bin
            ./firmware/*.manifest
            ./firmware/*.img.gz
            ./firmware/*.itb
            ./firmware/*.fip
            ./firmware/*.ubi
          body_path: ./release_body.txt
          make_latest: true
