name: Go_Release

on:
  workflow_dispatch:
    inputs:
      BUILD_VERSION:
        description: '选择要编译的版本'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - wifi
          - nowifi

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    permissions:
      actions: write
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_TIME=$(TZ=UTC-8 date +"%H.%M.%S")
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./nn6000v2/configs/link_nn6000v2_immwrt.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: |
          chmod +x ./nn6000v2/scripts/pre_clone_action.sh
          chmod +x ./nn6000v2/scripts/update.sh
          chmod +x ./nn6000v2/scripts/build.sh

      - name: Cache Dependencies
        uses: actions/cache@v5.0.4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ runner.os }}-${{ hashFiles('repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ runner.os }}-${{ hashFiles('repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build WiFi Version
        if: ${{ github.event.inputs.BUILD_VERSION == 'all' || github.event.inputs.BUILD_VERSION == 'wifi' }}
        run: |
          ./nn6000v2/scripts/pre_clone_action.sh link_nn6000v2_immwrt
          ./nn6000v2/scripts/build.sh link_nn6000v2_immwrt wifi
          mkdir -p ./firmware_wifi
          mv ./firmware/* ./firmware_wifi/ 2>/dev/null || true
          rm -rf ./firmware
          echo "WIFI_KVER=$(grep -oP "^kernel.*" ./firmware_wifi/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}" | head -1)" >> $GITHUB_ENV

      - name: Build NO WiFi Version
        if: ${{ github.event.inputs.BUILD_VERSION == 'all' || github.event.inputs.BUILD_VERSION == 'nowifi' }}
        run: |
          ./nn6000v2/scripts/pre_clone_action.sh link_nn6000v2_immwrt
          ./nn6000v2/scripts/build.sh link_nn6000v2_immwrt nowifi
          mkdir -p ./firmware_nowifi
          mv ./firmware/* ./firmware_nowifi/ 2>/dev/null || true
          rm -rf ./firmware
          echo "NOWIFI_KVER=$(grep -oP "^kernel.*" ./firmware_nowifi/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}" | head -1)" >> $GITHUB_ENV

      - name: Merge Firmware Files
        if: ${{ github.event.inputs.BUILD_VERSION == 'all' }}
        run: |
          mkdir -p ./firmware
          mv ./firmware_wifi/* ./firmware/ 2>/dev/null || true
          mv ./firmware_nowifi/* ./firmware/ 2>/dev/null || true
          rm -rf ./firmware_wifi ./firmware_nowifi
          echo "KVER=${{ env.WIFI_KVER }}" >> $GITHUB_ENV

      - name: Set Kernel Version for Single Build
        if: ${{ github.event.inputs.BUILD_VERSION != 'all' }}
        run: |
          if [ "${{ github.event.inputs.BUILD_VERSION }}" == "wifi" ]; then
            echo "KVER=${{ env.WIFI_KVER }}" >> $GITHUB_ENV
          else
            echo "KVER=${{ env.NOWIFI_KVER }}" >> $GITHUB_ENV
          fi

      - name: Delete Old Cache
        run: |
          gh cache list --key ${{ runner.os }}-${{ hashFiles('repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="

      - name: Prepare Release Body
        run: |
          if [ "${{ github.event.inputs.BUILD_VERSION }}" == "all" ]; then
            echo "云编译发布 - WiFi + NO_WIFI 双版本" > release_body.txt
          elif [ "${{ github.event.inputs.BUILD_VERSION }}" == "wifi" ]; then
            echo "云编译发布 - WiFi 版本" > release_body.txt
          else
            echo "云编译发布 - NO_WIFI 版本" > release_body.txt
          fi
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          if [ "${{ github.event.inputs.BUILD_VERSION }}" == "nowifi" ]; then
            echo "此版本已禁用 WiFi 驱动" >> release_body.txt
          else
            echo "WIFI 密码：147258369" >> release_body.txt
            if [ "${{ github.event.inputs.BUILD_VERSION }}" == "all" ]; then
              echo "此版本包含 WiFi 驱动" >> release_body.txt
            fi
          fi
          echo "LAN 地址：10.0.0.1" >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ env.BUILD_TIME }}_${{ github.event.inputs.BUILD_VERSION }}
          files: ./firmware/*.*
          body_path: ./release_body.txt
          token: ${{ secrets.GITHUB_TOKEN }}
