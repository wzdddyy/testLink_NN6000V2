name: Go_Release

on:
  workflow_dispatch:
    inputs:
      BUILD_VERSION:
        description: '选择要编译的版本'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - wifi
          - nowifi

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    permissions:
      actions: write
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        version: ${{ github.event.inputs.BUILD_VERSION == 'all' && fromJson('["wifi", "nowifi"]') || (github.event.inputs.BUILD_VERSION == 'wifi' && fromJson('["wifi"]') || fromJson('["nowifi"]')) }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set Version Variables
        run: |
          if [ "${{ matrix.version }}" == "wifi" ]; then
            echo "DEVICE_MODEL=link_nn6000v2_immwrt" >> $GITHUB_ENV
            echo "CONFIG_MODEL=link_nn6000v2_immwrt" >> $GITHUB_ENV
            echo "VERSION_NAME=WIFI" >> $GITHUB_ENV
          else
            echo "DEVICE_MODEL=link_nn6000v2_immwrt_nowifi" >> $GITHUB_ENV
            echo "CONFIG_MODEL=link_nn6000v2_immwrt" >> $GITHUB_ENV
            echo "VERSION_NAME=NO_WIFI" >> $GITHUB_ENV
          fi

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_TIME=$(TZ=UTC-8 date +"%H.%M.%S")
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./nn6000v2/configs/${{ env.CONFIG_MODEL }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV

      - name: Pre Clone
        run: |
          chmod +x ./nn6000v2/scripts/pre_clone_action.sh
          chmod +x ./nn6000v2/scripts/update.sh
          chmod +x ./nn6000v2/scripts/build.sh
          ./nn6000v2/scripts/pre_clone_action.sh ${{ env.CONFIG_MODEL }}

      - name: Cache Dependencies
        uses: actions/cache@v5.0.4
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('repo_flag') }}-${{ env.BUILD_DATE }}-${{ matrix.version }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('repo_flag') }}-${{ env.BUILD_DATE }}-
            ${{ matrix.os }}-${{ hashFiles('repo_flag') }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Build Firmware
        run: ./nn6000v2/scripts/build.sh ${{ env.CONFIG_MODEL }} ${{ matrix.version }}

      - name: Get Kernel Verion
        run: |
          # 获取内核版本
          echo "KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('repo_flag') }}-${{ matrix.version }} --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information
        run: |
          echo "=============================================="
          lscpu | grep -E "name|Core|Thread"
          echo "=============================================="
          df -h
          echo "=============================================="

      - name: Prepare Release Body
        run: |
          echo "云编译发布 - ${{ env.VERSION_NAME }}版本" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          if [ "${{ env.VERSION_NAME }}" == "WIFI" ]; then
            echo "WIFI 密码：147258369" >> release_body.txt
            echo "此版本包含 WiFi 驱动" >> release_body.txt
          else
            echo "此版本已禁用 WiFi 驱动" >> release_body.txt
          fi
          echo "LAN 地址：10.0.0.1" >> release_body.txt

      - name: Release Firmware
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ env.BUILD_TIME }}_${{ matrix.version }}
          files: ./firmware/*.*
          body_path: ./release_body.txt
          token: ${{ secrets.GITHUB_TOKEN }}
