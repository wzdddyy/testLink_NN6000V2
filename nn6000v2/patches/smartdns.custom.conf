# SmartDNS Custom Configuration
# 高级性能优化配置

#===============================================================================
# 缓存优化
#===============================================================================
cache-size 32768                    # 缓存大小 32MB（适合 2GB 内存）
cache-memory-limit 16777216         # 缓存内存限制 16MB

#===============================================================================
# TTL 优化
#===============================================================================
rr-ttl-max 86400                    # 最大 TTL 1 天（避免过期 IP）
rr-ttl-min 600                      # 最小 TTL 600 秒
rr-ttl-reply-min 30                 # 回复 TTL 最小值 30 秒

#===============================================================================
# 过期 DNS 服务优化
#===============================================================================
serve-expired-ttl 3600              # 过期缓存保留 1 小时（减少内存分配）
serve-expired-reply-ttl 5           # 过期响应 TTL 为 5 秒

#===============================================================================
# 查询优化
#===============================================================================
max-reply-ip-num 3                  # 最多返回 3 个 IP 地址
dualstack-ip-selection-threshold 15 # IPv4/IPv6 选择阈值
query-timeout 5                     # 查询超时 5 秒

#===============================================================================
# 预取优化
#===============================================================================
# prefetch-domain 已在 UCI 配置中启用 (prefetch_domain '1')
prefetch-interval 300               # 预取间隔 5 分钟
prefetch-threshold 3600             # 过期前 1 小时开始预取

#===============================================================================
# 引导 DNS 配置
#===============================================================================
server 223.5.5.5 -bootstrap-dns     # 使用阿里 DNS 作为引导 DNS

#===============================================================================
# 连接优化
#===============================================================================
tcp-connection-timeout 10           # TCP 连接超时 10 秒
tls-connection-timeout 10           # TLS 连接超时 10 秒

#===============================================================================
# 日志优化
#===============================================================================
log-level 2                         # 日志级别：2=警告
log-size 1024                       # 日志文件大小限制 1MB
log-num 3                           # 保留 3 个日志文件

#===============================================================================
# NFT 集合超时
#===============================================================================
nftset-timeout yes                  # 启用 NFT 集合超时

